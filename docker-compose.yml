services:
  zima-storage-manager:
    image: ghcr.io/angoloinformatico/zima-storage-manager:latest
    # Per sviluppo locale, commenta image e abilita: build: .
    container_name: zima-storage-manager
    restart: unless-stopped
    privileged: true
    pid: host
    ports:
      - "8765:8765"
    environment:
      ZSM_PASSWORD: "${ZSM_PASSWORD:?Imposta ZSM_PASSWORD nel file .env}"
      ZSM_HOST_NAMESPACE: "1"
      ZSM_CONFIG: "/etc/zsm/config.json"
    volumes:
      - /var/lib/casaos/db:/var/lib/casaos/db
      - /media:/media
      - /DATA/.media:/DATA/.media
      - /var/lib/casaos_data/.media:/var/lib/casaos_data/.media
      - ./config.example.json:/etc/zsm/config.json:ro
      - zsm-data:/var/lib/zsm
      - zsm-logs:/var/log/zsm

volumes:
  zsm-data:
  zsm-logs:
