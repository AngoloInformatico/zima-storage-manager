name: zima-storage-manager

services:
  zima-storage-manager:
    image: ghcr.io/angoloinformatico/zima-storage-manager:v3.0.0-rc9
    container_name: zima-storage-manager
    hostname: zima-storage-manager
    restart: unless-stopped
    privileged: true
    pid: host
    ports:
      - target: 8787
        published: "8787"
        protocol: tcp
    environment:
      TZ: ${TZ:-Europe/Rome}
      ZSM_HOST: 0.0.0.0
      ZSM_PORT: "8787"
      ZSM_PASSWORD: ${ZSM_PASSWORD:-zima-storage-manager}
      ZSM_CONTAINER_MODE: "1"
      ZSM_HOST_NAMESPACE: "1"
      ZSM_SERVICE_NAME: ${ZSM_SERVICE_NAME:-auto}
      ZSM_DATABASE_PATH: /var/lib/casaos/db/local-storage.db
      ZSM_BACKUP_DIR: /var/lib/zsm/backups
      ZSM_REPORT_DIR: /var/lib/zsm/reports
      ZSM_LOG_DIR: /var/log/zsm
    volumes:
      - type: bind
        source: /var/lib/casaos
        target: /var/lib/casaos
      - type: bind
        source: /media
        target: /media
      - type: bind
        source: /DATA/.media
        target: /DATA/.media
      - type: bind
        source: /var/lib/casaos_data
        target: /var/lib/casaos_data
      - type: bind
        source: /dev
        target: /dev
      - type: bind
        source: /run/udev
        target: /run/udev
        read_only: true
      - type: bind
        source: /run/dbus/system_bus_socket
        target: /run/dbus/system_bus_socket
      - type: bind
        source: /DATA/AppData/zima-storage-manager/backups
        target: /var/lib/zsm/backups
      - type: bind
        source: /DATA/AppData/zima-storage-manager/reports
        target: /var/lib/zsm/reports
      - type: bind
        source: /DATA/AppData/zima-storage-manager/logs
        target: /var/log/zsm
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

x-casaos:
  architectures:
    - amd64
    - arm64
  main: zima-storage-manager
  author: Alex Lignola
  category: Utilities
  developer: Angolo Informatico
  icon: https://raw.githubusercontent.com/AngoloInformatico/zima-storage-manager/main/assets/icon.png
  index: /
  port_map: "8787"
  scheme: http
  store_app_id: zima-storage-manager
  title:
    en_us: Zima Storage Manager
    it_it: Zima Storage Manager
  tagline:
    en_us: Manage ZimaOS storage safely
    it_it: Gestisci in sicurezza i dischi ZimaOS
  description:
    en_us: Rename disk mount records, create persistent backups, restore the storage database and run diagnostics from a protected web interface.
    it_it: Rinomina i dischi, crea backup persistenti, ripristina il database di archiviazione ed esegue la diagnostica da un'interfaccia web protetta.
  tips:
    before_install:
      en_us: Change the default ZSM_PASSWORD after importing the Compose file.
      it_it: Cambia la password ZSM_PASSWORD predefinita dopo avere importato il file Compose.
  envs:
    - container: ZSM_PASSWORD
      description:
        en_us: Web access password
        it_it: Password di accesso web
    - container: TZ
      description:
        en_us: Time zone
        it_it: Fuso orario
  ports:
    - container: "8787"
      description:
        en_us: Web interface
        it_it: Interfaccia web
  volumes:
    - container: /var/lib/zsm/backups
      description:
        en_us: Persistent database backups
        it_it: Backup persistenti del database
    - container: /var/lib/zsm/reports
      description:
        en_us: Persistent operation reports
        it_it: Report persistenti delle operazioni
    - container: /var/log/zsm
      description:
        en_us: Persistent logs and timeline
        it_it: Log e cronologia persistenti
