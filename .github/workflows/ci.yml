name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Check release version consistency
        run: python scripts/check-version.py
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Tests
        run: pytest -q
      - name: Compile
        run: python -m compileall -q zsm
      - name: Bash syntax
        run: bash -n install.sh uninstall.sh scripts/install-zimaos.sh scripts/update-zimaos.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate Compose
        run: docker compose config >/dev/null
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zima-storage-manager:ci
